<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Trivia Game</title>
</head>
<body>
    <div class="container">
        <div id="setup" class="screen active">
            <h1>Welcome to Trivia Game</h1>
            <input type="text" id="first-player" placeholder="Player 1 Name">
            <input type="text" id="second-player" placeholder="Player 2 Name">
            <button id="start">Start Game</button>
        </div>

        <div id="categories" class="screen">
            <h2>Select a Category</h2>
            <div id="cat-list"></div>
        </div>

        <div id="question" class="screen">
            <h2 id="current"></h2>
            <p id="q-text"></p>
            <div id="options"></div>
        </div>

        <div id="post-cat" class="screen">
            <h2>Category Completed</h2>
            <button id="new-cat">New Category</button>
            <button id="end">End Game</button>
        </div>

        <div id="game-over" class="screen">
            <h2>Game Over</h2>
            <div id="scores"></div>
            <div id="winner"></div>
            <button id="new-game">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
